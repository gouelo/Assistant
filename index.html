<head>

    <title>ספירת העומר</title>
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: #0a0a1a;
            font-family: 'Frank Ruhl Libre', serif;
            display: block;
            overflow-x: hidden;
            position: relative;
        }
        .stars { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
        .star { position:absolute; background:white; border-radius:50%; animation:twinkle var(--dur,3s) ease-in-out infinite; animation-delay:var(--delay,0s); opacity:0; }
        @keyframes twinkle { 0%,100%{opacity:0;transform:scale(0.8)} 50%{opacity:var(--max-opacity,0.8);transform:scale(1.2)} }
        .particles { position:fixed; top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0; }
        .particle { position:absolute; width:3px;height:3px;background:#f4c430;border-radius:50%; animation:float var(--dur,8s) ease-in-out infinite; animation-delay:var(--delay,0s); opacity:0; bottom:-10px; left:var(--left,50%); }
        @keyframes float { 0%{opacity:0;transform:translateY(0) scale(1)} 10%{opacity:0.8} 90%{opacity:0.4} 100%{opacity:0;transform:translateY(-100vh) scale(0.3) rotate(360deg)} }
        .moon { position:fixed;top:60px;left:80px;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fffde7,#f4c430,#e6a800);box-shadow:0 0 40px 15px rgba(244,196,48,0.3),0 0 80px 30px rgba(244,196,48,0.1);animation:moonGlow 4s ease-in-out infinite;z-index:1; }

        .container { position:relative;z-index:10;width:100%;max-width:700px;padding:20px;margin:0 auto;padding-bottom:60px; }

        /* ── Hero / Parallax ── */
        .hero { height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden; }
        .para-layer { position:absolute;top:0;left:0;width:100%;height:130%;pointer-events:none;will-change:transform; }
        .hero-content { text-align:center;z-index:10;position:relative;padding:20px;will-change:transform,opacity; }
        .hero-eyebrow { font-size:13px;letter-spacing:6px;color:rgba(244,196,48,0.6);text-transform:uppercase;margin-bottom:20px;animation:hFadeDown 1s ease both; }
        .hero-big { font-size:clamp(64px,15vw,140px);font-weight:900;line-height:0.95;background:linear-gradient(180deg,#fffde7 0%,#f4c430 55%,#c8860a 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:hAppear 1.2s ease both 0.15s;filter:drop-shadow(0 0 50px rgba(244,196,48,0.35)); }
        .hero-line { width:70px;height:1px;background:linear-gradient(90deg,transparent,rgba(244,196,48,0.6),transparent);margin:22px auto; }
        .hero-sub { font-size:clamp(13px,2.5vw,17px);color:rgba(244,196,48,0.55);letter-spacing:5px;animation:hFadeDown 1s ease both 0.4s; }
        @keyframes hAppear { from{opacity:0;transform:scale(0.88) translateY(-24px)} to{opacity:1;transform:scale(1) translateY(0)} }
        @keyframes hFadeDown { from{opacity:0;transform:translateY(-14px)} to{opacity:1;transform:translateY(0)} }
        .scroll-hint { position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;color:rgba(244,196,48,0.4);font-size:11px;letter-spacing:3px;text-transform:uppercase;animation:shBounce 2.5s ease-in-out infinite; }

        @keyframes shBounce { 0%,100%{transform:translateX(-50%) translateY(0);opacity:0.4} 50%{transform:translateX(-50%) translateY(10px);opacity:0.85} }

        .card {
            background: linear-gradient(135deg, rgba(15,15,40,0.97) 0%, rgba(10,10,25,0.99) 100%);
            border: 1px solid rgba(244,196,48,0.3);
            border-radius: 24px;
            padding: 44px 38px;
            text-align: center;
            box-shadow: 0 0 60px rgba(244,196,48,0.1), 0 30px 60px rgba(0,0,0,0.5);
            animation: cardFloat 6s ease-in-out infinite;
            position: relative;
            overflow: hidden;

        .weeks-part { font-size:0.82em;color:rgba(244,196,48,0.85); }

        .divider { width:60px;height:2px;background:linear-gradient(90deg,transparent,#f4c430,transparent);margin:26px auto; }

        /* Blessing section */
        .bracha-section {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(244,196,48,0.15);
            border-radius: 16px;
            padding: 22px 20px;
            margin-bottom: 16px;
            text-align: center;

        .bracha-text { font-size:clamp(16px,3.5vw,20px);color:#fffde7;line-height:2;direction:rtl; }
        .bracha-highlight { color:#f4c430;font-weight:700; }

        /* Harachaman */
        .harachaman-section {
            background: rgba(244,196,48,0.04);
            border: 1px solid rgba(244,196,48,0.12);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .harachaman-text { font-size:clamp(15px,3vw,18px);color:rgba(255,255,255,0.85);line-height:2;direction:rtl; }

        /* Torah section */
        .torah-section {
            background: rgba(244,196,48,0.05);
            border-radius: 16px;
            padding: 24px 20px;
            border: 1px solid rgba(244,196,48,0.15);
        }
        .torah-quote { font-size:clamp(17px,3.5vw,21px);font-weight:500;color:#fffde7;line-height:1.85;margin-bottom:10px;direction:rtl; }
        .torah-quote::before { content:'"';color:#f4c430;font-size:1.3em;font-weight:900; }
        .torah-quote::after { content:'"';color:#f4c430;font-size:1.3em;font-weight:900; }
        .torah-source { font-size:14px;color:rgba(244,196,48,0.75);font-style:italic;margin-bottom:12px; }
        .torah-explanation { font-size:clamp(14px,2.8vw,16px);color:rgba(255,255,255,0.65);line-height:1.9;direction:rtl;border-top:1px solid rgba(244,196,48,0.1);padding-top:12px;margin-top:4px; }

        .date-display { margin-top:26px;font-size:13px;color:rgba(255,255,255,0.3);letter-spacing:1px; }
        .message-card { font-size:clamp(22px,5vw,32px);color:#fffde7;line-height:1.6; }
        .message-sub { font-size:16px;color:rgba(244,196,48,0.7);margin-top:12px; }

        @media(max-width:480px){ .card{padding:30px 18px;} .moon{width:50px;height:50px;top:30px;left:30px;} }
    </style>
</head>

{ q:'עַל שְׁלשָׁה דְבָרִים הָעוֹלָם עוֹמֵד: עַל הַתּוֹרָה וְעַל הָעֲבוֹדָה וְעַל גְּמִילוּת חֲסָדִים', s:'שמעון הצדיק, פרקי אבות א, ב', e:'שלושה עמודים — תורה, עבודה, וחסד. בלא אחד מהם העולם אינו יכול לעמוד. הם כמו שלוש רגלי כיסא: הסר אחת ממנה — הכל קורס.' },

{ q:'כִּי טוֹב לְהוֹדוֹת לַה\' וּלְזַמֵּר לְשִׁמְךָ עֶלְיוֹן', s:'תהילים צב, ב', e:'מזמור השבת — ביום המנוחה, כשאדם עוצר מן המרוץ, הוא יכול לראות את הטוב שמסביבו. ההודיה אינה רק תגובה לטובה — היא עצמה מגלה את הטוב שקיים.' },
// 8 - חסד שבגבורה
{ q:'אֵיזֶהוּ גִבּוֹר? הַכּוֹבֵשׁ אֶת יִצְרוֹ', s:'בן זומא, פרקי אבות ד, א', e:'אנו מכבדים גיבורים צבאיים — אך החכמים מגלים שהגבורה האמיתית היא פנימית. הכובש את יצרו — גיבור יותר מכובש ערים. כי הקרב הקשה ביותר הוא זה המתנהל בלב האדם.' },
// 9 - גבורה שבגבורה
{ q:'לְעוֹלָם יִהְיֶה אָדָם רַךְ כַּקָּנֶה וְאַל יְהֵא קָשֶׁה כָּאֶרֶז', s:'תלמוד בבלי, תענית כ, ב', e:'הרוח מכופף את הקנה — אבל הוא אינו נשבר. הרוח שוברת את הארז הגאה — אבל הוא נופל. הגמישות הפנימית היא עוצמה עצומה. הרוך אינו חולשה; הוא הגבורה הבשלה.' },
// 10 - תפארת שבגבורה
{ q:'בִּמְקוֹם שֶׁבַּעֲלֵי תְשׁוּבָה עוֹמְדִין, אֵין צַדִּיקִים גְּמוּרִים יְכוֹלִין לַעֲמוֹד', s:'תלמוד בבלי, ברכות לד, ב', e:'מי שכשל ושב — עולה גבוה יותר ממי שלא כשל מעולם. מדוע? כי הוא הכיר את חולשתו, נלחם ביצרו, ובחר לשוב. זוהי התשובה — לא מחיקת העבר, אלא הפיכתו לכנפיים.' },
// 11 - נצח שבגבורה
{ q:'כָּל כָּבוֹד בַּת מֶלֶךְ פְּנִימָה', s:'תהילים מה, יד', e:'הפסוק מדבר על בת המלך — הנשמה. כבודה האמיתי אינו בחיצוניות, בבגדים או בתואר — אלא בעולמה הפנימי, בנשמתה, בטוהרה. מה שנמצא בפנים — זה שנצחי.' },
// 12 - הוד שבגבורה
{ q:'אֵיזֶהוּ עָשִׁיר? הַשָּׂמֵחַ בְּחֶלְקוֹ', s:'בן זומא, פרקי אבות ד, א', e:'בן זומא הופך את המושג עושר על פיו. עשיר אינו מי שיש לו הכי הרבה — אלא מי שרוצה את מה שיש לו. השמחה בחלקנו היא אמנות: לראות ברכה במה שניתן לנו.' },
// 13 - יסוד שבגבורה
{ q:'לְפוּם צַעֲרָא אַגְרָא', s:'פרקי אבות ה, כג', e:'ממשנה עמוקה: השכר הוא פרופורציונלי לטרחה ולמאמץ. לא רק בגן עדן — אלא בחיים עצמם. מה שקשה להשיג — יקר יותר. המאמץ הוא חלק מהמתנה.' },
// 14 - מלכות שבגבורה
{ q:'אֵין הַבַּיְשָׁן לָמֵד וְאֵין הַקַּפְּדָן מְלַמֵּד', s:'פרקי אבות ב, ה', e:'הלמידה דורשת אומץ — לשאול שאלות, להודות שאינך יודע. ההוראה דורשת סבלנות — לפגוש את התלמיד היכן שהוא נמצא. כך נבנות הממלכות של דעת.' },
// 15 - חסד שבתפארת
{ q:'כָּל יִשְׂרָאֵל עֲרֵבִים זֶה בָּזֶה', s:'תלמוד בבלי, שבועות לט, א', e:'ערבות — לשון ערב, לשון ערוב. כולנו קשורים זה בזה כחוטים שנארגו יחד. כשאחד נופל — כולם מרגישים. כשאחד עולה — כולם מתרוממים. זו האחריות ההדדית של עם ישראל.' },
// 16 - גבורה שבתפארת
{ q:'הֱוֵי מִתַּלְמִידָיו שֶׁל אַהֲרֹן, אוֹהֵב שָׁלוֹם וְרוֹדֵף שָׁלוֹם', s:'הלל, פרקי אבות א, יב', e:'הלל בוחר בדגם של אהרן — לא משה. אהרן לא הוריד תורה מהשמים, אבל הוא היה שלום. הוא היה זה שהלך בין אנשים ריבנים וחיבר ביניהם. לרדוף שלום — זו מלאכה אקטיבית, לא פסיבית.' },
// 17 - תפארת שבתפארת
{ q:'שְׁמַע יִשְׂרָאֵל ה\' אֱלֹהֵינוּ ה\' אֶחָד', s:'דברים ו, ד', e:'הפסוק הנשגב ביותר ביהדות. לא "שמע" — שמיעה פסיבית. אלא קבלת מלכות שמים מחדש בכל יום. האחדות האלוהית אינה רק עובדה תיאולוגית — היא גם הזמנה: שגם אנחנו נהיה אחד.' },
// 18 - נצח שבתפארת
{ q:'כָּל אֶחָד וְאֶחָד חַיָּב לוֹמַר: בִּשְׁבִילִי נִבְרָא הָעוֹלָם', s:'משנה סנהדרין ד, ה', e:'המשנה מחייבת כל אדם לדעת שהעולם כולו שווה כנגדו. זהו לא גאווה — זוהי אחריות. אם כל העולם נברא בשבילי, אין לי רשות לחיות חיי בינוניות. אני חייב לעשות משהו גדול.' },
// 19 - הוד שבתפארת
{ q:'אֲנִי לְדוֹדִי וְדוֹדִי לִי', s:'שיר השירים ו, ג', e:'ראשי התיבות של "אני לדודי ודודי לי" — אלול. חודש הרחמים. הפסוק מתאר יחסי אהבה הדדיים: לא רק אנחנו מחפשים את הקב"ה — הוא מחפש אותנו. זוהי ההזמנה לשוב.' },
// 20 - יסוד שבתפארת
{ q:'וְאָהַבְתָּ לְרֵעֲךָ כָּמוֹךָ — זֶה כְּלָל גָּדוֹל בַּתּוֹרָה', s:'רבי עקיבא, ספרא קדושים', e:'רבי עקיבא — שעצמו גדל מאפס ועלה לגדולה — בוחר בפסוק הזה ככלל הגדול בתורה. אהבת הרע אינה רגש — היא מעשה: לחשוב על האחר לפני שאתה פועל.' },
// 21 - מלכות שבתפארת
{ q:'רָאִיתִי בְּנֵי עֲלִיָּה וְהֵם מֻעָטִים', s:'רבי שמעון בר יוחאי, סוכה מה, ב', e:'רשב"י מגלה שגדולה אמיתית היא נחלתם של מעטים — לא כי הדרך סגורה, אלא כי מעטים בוחרים ללכת בה. ל"ג בעומר — יום הילולת רשב"י — הוא חגיגת האור שבתוך החושך.' },
// 22 - חסד שבנצח
{ q:'הֱוֵי דָן אֶת כָּל הָאָדָם לְכַף זְכוּת', s:'יהושע בן פרחיה, פרקי אבות א, ו', e:'לדון לכף זכות זו אמנות. זה אומר: לפני שאתה שופט — עצור. שאל את עצמך: האם ייתכן שיש פה הסבר אחר? חיים של דן לכף זכות הם חיים עם פחות כעס ויותר שלווה.' },
// 23 - גבורה שבנצח
{ q:'כָּל הַמְקַיֵּם נֶפֶשׁ אַחַת — מַעֲלֶה עָלָיו הַכָּתוּב כְּאִלּוּ קִיֵּם עוֹלָם מָלֵא', s:'משנה סנהדרין ד, ה', e:'ולהפך — המאבד נפש אחת כאילו איבד עולם מלא. כל אדם הוא עולם שלם. זוהי הסיבה שחיי אדם הם קדושים מכל — לא ניתן לשקלל אותם, לא ניתן לוותר עליהם.' },
// 24 - תפארת שבנצח
{ q:'אִם אֵין אֲנִי לִי — מִי לִי? וּכְשֶׁאֲנִי לְעַצְמִי — מָה אֲנִי? וְאִם לֹא עַכְשָׁיו — אֵימָתַי?', s:'הלל, פרקי אבות א, יד', e:'שלוש שאלות שמכילות את כל פילוסופיית החיים: אחריות לעצמך, אחריות לאחרים, ודחיפות. הלל שואל: אם לא עכשיו — אימתי? מחר הוא לא מובטח.' },
// 25 - נצח שבנצח
{ q:'יָגַעְתִּי וְלֹא מָצָאתִי — אַל תַּאֲמִין. לֹא יָגַעְתִּי וּמָצָאתִי — אַל תַּאֲמִין', s:'תלמוד בבלי, מגילה ו, ב', e:'עקרון ממלכותי בעולם הרוחני והגשמי כאחד: אין קיצורי דרך לדברים שראויים. יגיעה — היא המפתח. לא הכשרון, לא המזל — היגיעה.' },
// 26 - הוד שבנצח
{ q:'גַּם זוּ לְטוֹבָה', s:'רבי נחום איש גמזו, תענית כא, א', e:'רבי נחום חי חיים של סבל פיזי קשה — ועם זאת אמר על כל דבר "גם זו לטובה". זה לא אופטימיות שטחית. זו אמונה עמוקה שהכל — גם מה שנראה רע — הוא חלק ממהלך גדול יותר.' },
// 27 - יסוד שבנצח
{ q:'צַדִּיק בֶּאֱמוּנָתוֹ יִחְיֶה', s:'חבקוק ב, ד', e:'הנביא חבקוק, שראה סבל ורשע, הגיע למסקנה אחת: הצדיק יחיה — לא בזכות כוחו או חוכמתו — אלא באמונתו. האמונה היא עוגן שמחזיק גם כשהסערה הכי חזקה.' },
// 28 - מלכות שבנצח
{ q:'כִּי נֵר מִצְוָה וְתוֹרָה אוֹר', s:'משלי ו, כג', e:'שלמה המלך מבחין: מצוה — נר. תורה — אור. הנר מאיר רגע; האור ממשיך. כל מצוה שאדם עושה היא נר קטן — אבל התורה שלומד ומנחיל לדורות הבאים — אור עולם.' },
// 29 - חסד שבהוד
{ q:'חַיָּב אָדָם לְבָרֵךְ עַל הָרָעָה כְּשֵׁם שֶׁהוּא מְבָרֵךְ עַל הַטּוֹבָה', s:'משנה ברכות ט, ה', e:'מדוע? כי אנחנו רואים רק את ההווה — הקב"ה רואה את התמונה המלאה. מה שנראה לנו רע עכשיו — אולי הוא ממש הטובה הגדולה שמגיעה לנו. ברכה על הרעה היא אמון בסיפור הגדול.' },
// 30 - גבורה שבהוד
{ q:'הוֹדוּ לַה\' כִּי טוֹב, כִּי לְעוֹלָם חַסְדּוֹ', s:'תהילים קז, א', e:'הפסוק שחוזר שוב ושוב בתהילים. "לעולם" — לא רק כרגע, לא רק כשטוב לנו. חסד ה\' הוא נצחי, גם כשאנחנו לא מרגישים אותו. ההודיה מזמינה אותנו לראות מעבר לרגע הנוכחי.' },
// 31 - תפארת שבהוד
{ q:'לְעוֹלָם יִרְאֶה אָדָם עַצְמוֹ כְּאִלּוּ חֶצְיוֹ חַיָּב וְחֶצְיוֹ זַכַּאי', s:'תלמוד בבלי, קידושין מ, ב', e:'פועל יוצא מדהים מהמשנה: עשה מצוה אחת — הכרעת את עצמך ואת העולם לכף זכות. חטאת — הכרעת הכל לכף חובה. כל מעשה קטן — משנה את המאזניים של העולם.' },
// 32 - נצח שבהוד
{ q:'כָּל דִּבּוּרֵי הַתּוֹרָה — כְּגַחֲלֵי אֵשׁ! כִּי הַתּוֹרָה נִקְרֵאת "אֵשׁ דָּת"', s:'רשב"י — רבי שמעון בר יוחאי, ספרי דברים', e:'🔥 לג בעומר — יום ההילולא של רשב"י! הוא גילה שהתורה אינה ספר חוקים יבש — היא אש חיה. ממנו יצא הזוהר הקדוש, ים של אור. יהי זכרו ברוך לעד.' },
// 33 - הוד שבהוד
{ q:'כָּל הָאוֹמֵר דָּבָר בְּשֵׁם אוֹמְרוֹ — מֵבִיא גְאֻלָּה לָעוֹלָם', s:'פרקי אבות ו, ו', e:'אסתר אמרה לאחשורוש "בשם מרדכי" — ובזה הובאה הגאולה. לייחס דברים למקורם זה לא רק הגינות — זה פעולה רוחנית שמביאה אור. כשאתה מוסר בשם מישהו — אתה מחבר עולמות.' },
// 34 - יסוד שבהוד
{ q:'בְּכָל דּוֹר וָדוֹר חַיָּב אָדָם לִרְאוֹת אֶת עַצְמוֹ כְּאִלּוּ הוּא יָצָא מִמִּצְרַיִם', s:'הגדה של פסח, על פי משנה פסחים י, ה', e:'לא רק לזכור את יציאת מצרים — אלא לחוות אותה. כל אחד מאיתנו יצא ממצרים — מהמצרים שלו, מהכלא הפנימי שלו. החירות היא לא רק היסטוריה — היא אפשרות יומיומית.' },
// 35 - מלכות שבהוד
{ q:'מַלְכוּת שָׁמַיִם שְׁלֵמָה אֵינָהּ מִתְגַּלָּה אֶלָּא בִּשְׂמָחָה', s:'ספר בעל שם טוב', e:'הבעל שם טוב מגלה: הקב"ה אינו שורה בתוך עצבות. השכינה שורה רק מתוך שמחה של מצוה. לכן — שמחה אינה מותרות רוחנית; היא תנאי לנוכחות האלוהית.' },
// 36 - חסד שביסוד
{ q:'כָּל יִשְׂרָאֵל יֵשׁ לָהֶם חֵלֶק לָעוֹלָם הַבָּא', s:'משנה סנהדרין י, א', e:'פתיחת פרק "חלק" — אחד הפרקים העמוקים במשנה. כל אחד מישראל — ללא יוצא מן הכלל — יש לו חלק לעולם הבא. זה לא פרס — זה עובדה. השאלה היא רק מה נעשה איתו בינתיים.' },
// 37 - גבורה שביסוד
{ q:'לֹא עָלֶיךָ הַמְּלָאכָה לִגְמוֹר, וְלֹא אַתָּה בֶּן חוֹרִין לִבָּטֵל מִמֶּנָּה', s:'רבי טרפון, פרקי אבות ב, טז', e:'אחת הפסקאות הגדולות בתולדות המחשבה היהודית. אין חובה להשלים — יש חובה להתחיל ולהמשיך. הפטור מן הניצחון אינו פטור מן המאמץ. כל צעד קטן הוא עולם שלם.' },
// 38 - תפארת שביסוד

function getOmerFormula(day) {
    const weeks = Math.floor(day / 7);
    const remaining = day % 7;
    let dayPart = day === 1 ? 'יוֹם אֶחָד' : hebrewNumbers[day] + ' יָמִים';
    let weeksPart = '';
    if (weeks > 0) {
        weeksPart = ' שֶׁהֵם ' + weekNames[weeks];
        if (remaining === 1) weeksPart += ' וְיוֹם אֶחָד';
        else if (remaining > 1) weeksPart += ' וְ' + hebrewNumbers[remaining] + ' יָמִים';
    }
    return { dayPart, weeksPart };
}

function getTodayOmerDay() {
    // Israel is UTC+3 in April (IDT). Add offset manually — avoids toLocaleString browser inconsistencies.
    const nowUTC = new Date();
    const israelOffsetMs = 3 * 60 * 60 * 1000;
    const nowIsrael = new Date(nowUTC.getTime() + israelOffsetMs);

    const hour = nowIsrael.getUTCHours();

    // Nightfall (צאת הכוכבים) approximation for Israel in April: ~20:00 IDT
    const isAfterNightfall = hour >= 20;

    // Build today's date in Israel (UTC-based, after applying offset)
    const halachicDate = new Date(Date.UTC(
        nowIsrael.getUTCFullYear(),
        nowIsrael.getUTCMonth(),
        nowIsrael.getUTCDate()
    ));
    // Before nightfall = still on the previous Jewish day
    if (!isAfterNightfall) {
        halachicDate.setUTCDate(halachicDate.getUTCDate() - 1);
    }

    const start = new Date(Date.UTC(2026, 3, 2)); // April 2, 2026 — Day 1 of Omer
    return Math.floor((halachicDate - start) / 86400000) + 1;
}

function getHebrewDate() {
    return new Date().toLocaleDateString('he-IL', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}

function render() {
    const day = getTodayOmerDay();
    const el = document.getElementById('content');

    if (day < 1) {
        const d = 1 - day;
        el.innerHTML = `<p class="header-title">ספירת העומר</p>
        <div class="message-card">🌸 הספירה מתחילה בעוד ${d === 0 ? 'הלילה!' : d + ' ימים'}</div>
        <p class="message-sub">חג פסח שמח! 🎊</p>
        <p class="date-display">${getHebrewDate()}</p>`;
        return;
    }
    if (day > 49) {
        el.innerHTML = `<p class="header-title">✨ חג שבועות שמח! ✨</p>
        <div class="message-card">🌸 תורה וחיים לעם ישראל! 🌸</div>
        <p class="date-display">${getHebrewDate()}</p>`;
        return;
    }

    const { dayPart, weeksPart } = getOmerFormula(day);
    const sefirah = sefirot[day];
    const t = torahThoughts[day];
    const isLag = day === 33;

    el.innerHTML = `
        <p class="header-title">${isLag ? '🔥 לג בעומר 🔥' : 'ספירת העומר'}</p>
        <div class="sefirah-badge">${sefirah}</div>

            </p>

        <!-- הספירה -->
        <p class="omer-text">

                הָרַחֲמָן הוּא יַחֲזִיר לָנוּ עֲבוֹדַת בֵּית הַמִּקְדָּשׁ לִמְקוֹמָהּ,<br>

// Stars & particles
function createStars() {
    const c = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
        const s = document.createElement('div'); s.className = 'star';
        const sz = Math.random()*2.5+0.5;
        s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${Math.random()*4+2}s;--delay:${Math.random()*6}s;--max-opacity:${Math.random()*0.7+0.3}`;
        c.appendChild(s);
    }
}
function createParticles() {
    const c = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
        const p = document.createElement('div'); p.className = 'particle';
        p.style.cssText = `--left:${Math.random()*100}%;--dur:${Math.random()*10+6}s;--delay:${Math.random()*10}s`;
        c.appendChild(p);
    }
}
createStars(); createParticles(); render();

// ── Parallax Hero ──
function initParallax() {
    const hero = document.getElementById('hero');
    const deep = document.getElementById('paraDeep');
    const near = document.getElementById('paraNear');
    const content = document.getElementById('heroContent');
    const hint = document.getElementById('scrollHint');

    // Seed parallax star layers
    function seedLayer(el, count, maxSize, maxOpacity) {
        for (let i = 0; i < count; i++) {
            const s = document.createElement('div');
            const sz = Math.random() * maxSize + 0.8;
            s.style.cssText = `position:absolute;background:white;border-radius:50%;width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;opacity:${(Math.random()*maxOpacity).toFixed(2)}`;
            el.appendChild(s);
        }
    }
    seedLayer(deep, 90, 1.8, 0.55);  // slow, distant
    seedLayer(near, 45, 3.5, 0.8);   // fast, close

    // Gold dust particles in hero
    for (let i = 0; i < 12; i++) {
        const p = document.createElement('div');
        const sz = Math.random() * 4 + 2;
        p.style.cssText = `position:absolute;width:${sz}px;height:${sz}px;background:radial-gradient(circle,#f4c430,transparent);border-radius:50%;top:${Math.random()*100}%;left:${Math.random()*100}%;animation:float ${Math.random()*8+6}s ease-in-out infinite;animation-delay:${Math.random()*6}s;opacity:0;pointer-events:none;z-index:2`;
        hero.appendChild(p);
    }

    let ticking = false;
    window.addEventListener('scroll', () => {
        if (!ticking) {
            requestAnimationFrame(() => {
                const y = window.scrollY;
                const h = hero.offsetHeight;
                if (y <= h) {
                    const pct = y / h;
                    deep.style.transform    = `translateY(${y * 0.18}px)`;
                    near.style.transform    = `translateY(${y * 0.42}px)`;
                    content.style.transform = `translateY(${y * 0.58}px)`;
                    content.style.opacity   = Math.max(0, 1 - pct * 2);
                    hint.style.opacity      = Math.max(0, 1 - pct * 4);
                }
                ticking = false;
            });
            ticking = true;
        }
    }, { passive: true });
}
initParallax();
