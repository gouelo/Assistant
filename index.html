<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ספירת העומר</title>
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a1a;
            --card-bg: linear-gradient(135deg, rgba(15,15,40,0.97) 0%, rgba(10,10,25,0.99) 100%);
            --text-primary: #fffde7;
            --text-secondary: rgba(255,255,255,0.65);
            --text-muted: rgba(255,255,255,0.3);
            --gold: #f4c430;
            --gold-dim: rgba(244,196,48,0.7);
            --gold-faint: rgba(244,196,48,0.1);
            --gold-faintest: rgba(244,196,48,0.04);
            --border: rgba(244,196,48,0.3);
            --border-light: rgba(244,196,48,0.15);
            --border-xlight: rgba(244,196,48,0.12);
            --nav-bg: rgba(8,8,20,0.95);
            --nav-border: rgba(244,196,48,0.2);
            --section-bg: rgba(255,255,255,0.03);
            --section-border: rgba(244,196,48,0.15);
            --track-bg: linear-gradient(135deg, rgba(15,15,40,0.97) 0%, rgba(10,10,25,0.99) 100%);
            --track-border: rgba(244,196,48,0.25);
            --track-border-hover: rgba(244,196,48,0.45);
            --track-glow-hover: rgba(244,196,48,0.08);
            --text-panel-bg: rgba(255,255,255,0.03);
            --text-panel-border: rgba(244,196,48,0.12);
            --progress-bg: rgba(255,255,255,0.08);
            --nav-btn-color: rgba(244,196,48,0.55);
            --nav-btn-hover: rgba(244,196,48,0.85);
            --nav-sep: rgba(244,196,48,0.2);
            --hero-eyebrow: rgba(244,196,48,0.6);
            --hero-sub: rgba(244,196,48,0.55);
            --scroll-hint: rgba(244,196,48,0.4);
            --spinner-bg: rgba(244,196,48,0.2);
            --card-glow: rgba(244,196,48,0.1);
            --card-shadow: 0 0 60px rgba(244,196,48,0.1), 0 30px 60px rgba(0,0,0,0.5);
            --card-top-line: rgba(244,196,48,0.6);
            --track-top-line: rgba(244,196,48,0.5);
        }
        body.light {
            --bg: #f5f0e8;
            --card-bg: linear-gradient(135deg, #fffef9 0%, #fdf8f0 100%);
            --text-primary: #2c1810;
            --text-secondary: rgba(44,24,16,0.65);
            --text-muted: rgba(44,24,16,0.35);
            --gold: #b8860b;
            --gold-dim: rgba(139,90,43,0.7);
            --gold-faint: rgba(139,90,43,0.08);
            --gold-faintest: rgba(139,90,43,0.04);
            --border: rgba(139,90,43,0.25);
            --border-light: rgba(139,90,43,0.15);
            --border-xlight: rgba(139,90,43,0.12);
            --nav-bg: rgba(255,250,240,0.97);
            --nav-border: rgba(139,90,43,0.15);
            --section-bg: rgba(139,90,43,0.04);
            --section-border: rgba(139,90,43,0.12);
            --track-bg: linear-gradient(135deg, #fffef9 0%, #fdf8f0 100%);
            --track-border: rgba(139,90,43,0.2);
            --track-border-hover: rgba(139,90,43,0.4);
            --track-glow-hover: rgba(139,90,43,0.06);
            --text-panel-bg: rgba(139,90,43,0.04);
            --text-panel-border: rgba(139,90,43,0.12);
            --progress-bg: rgba(44,24,16,0.08);
            --nav-btn-color: rgba(92,61,46,0.7);
            --nav-btn-hover: rgba(92,61,46,0.95);
            --nav-sep: rgba(139,90,43,0.2);
            --hero-eyebrow: rgba(92,61,46,0.7);
            --hero-sub: rgba(92,61,46,0.6);
            --scroll-hint: rgba(92,61,46,0.45);
            --spinner-bg: rgba(139,90,43,0.15);
            --card-glow: rgba(139,90,43,0.08);
            --card-shadow: 0 0 40px rgba(139,90,43,0.08), 0 20px 40px rgba(0,0,0,0.08);
            --card-top-line: rgba(139,90,43,0.4);
            --track-top-line: rgba(139,90,43,0.35);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: var(--bg);
            font-family: 'Frank Ruhl Libre', serif;
            display: block;
            overflow-x: hidden;
            position: relative;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .stars { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; transition: opacity 0.3s ease; }
        body.light .stars { opacity: 0.08; }
        .star { position:absolute; background:white; border-radius:50%; animation:twinkle var(--dur,3s) ease-in-out infinite; animation-delay:var(--delay,0s); opacity:0; }
        @keyframes twinkle { 0%,100%{opacity:0;transform:scale(0.8)} 50%{opacity:var(--max-opacity,0.8);transform:scale(1.2)} }
        .particles { position:fixed; top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0; transition: opacity 0.3s ease; }
        body.light .particles { opacity: 0; pointer-events: none; }
        .particle { position:absolute; width:3px;height:3px;background:var(--gold);border-radius:50%; animation:float var(--dur,8s) ease-in-out infinite; animation-delay:var(--delay,0s); opacity:0; bottom:-10px; left:var(--left,50%); }
        @keyframes float { 0%{opacity:0;transform:translateY(0) scale(1)} 10%{opacity:0.8} 90%{opacity:0.4} 100%{opacity:0;transform:translateY(-100vh) scale(0.3) rotate(360deg)} }
        .moon { position:fixed;top:60px;left:80px;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fffde7,#f4c430,#e6a800);box-shadow:0 0 40px 15px rgba(244,196,48,0.3),0 0 80px 30px rgba(244,196,48,0.1);animation:moonGlow 4s ease-in-out infinite;z-index:1;transition:opacity 0.3s ease; }
        body.light .moon { opacity: 0; pointer-events: none; }
        @keyframes moonGlow { 0%,100%{box-shadow:0 0 40px 15px rgba(244,196,48,0.3),0 0 80px 30px rgba(244,196,48,0.1)} 50%{box-shadow:0 0 60px 25px rgba(244,196,48,0.5),0 0 100px 50px rgba(244,196,48,0.2)} }

        .container { position:relative;z-index:10;width:100%;max-width:700px;padding:20px;margin:0 auto;padding-bottom:60px; }

        /* ── Hero / Parallax ── */
        .hero { height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden; }
        .para-layer { position:absolute;top:0;left:0;width:100%;height:130%;pointer-events:none;will-change:transform; }
        .hero-content { text-align:center;z-index:10;position:relative;padding:20px;will-change:transform,opacity; }
        .hero-eyebrow { font-size:13px;letter-spacing:6px;color:var(--hero-eyebrow);text-transform:uppercase;margin-bottom:20px;animation:hFadeDown 1s ease both;transition:color 0.3s ease; }
        .hero-big { font-size:clamp(64px,15vw,140px);font-weight:900;line-height:0.95;background:linear-gradient(180deg,#fffde7 0%,#f4c430 55%,#c8860a 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:hAppear 1.2s ease both 0.15s;filter:drop-shadow(0 0 50px rgba(244,196,48,0.35)); }
        body.light .hero-big { background:linear-gradient(180deg,#5c3d2e 0%,#b8860b 55%,#8b5a2b 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
        .hero-line { width:70px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);margin:22px auto;transition:background 0.3s ease; }
        .hero-sub { font-size:clamp(13px,2.5vw,17px);color:var(--hero-sub);letter-spacing:5px;animation:hFadeDown 1s ease both 0.4s;transition:color 0.3s ease; }
        @keyframes hAppear { from{opacity:0;transform:scale(0.88) translateY(-24px)} to{opacity:1;transform:scale(1) translateY(0)} }
        @keyframes hFadeDown { from{opacity:0;transform:translateY(-14px)} to{opacity:1;transform:translateY(0)} }
        .scroll-hint { position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--scroll-hint);font-size:11px;letter-spacing:3px;text-transform:uppercase;animation:shBounce 2.5s ease-in-out infinite;transition:color 0.3s ease; }
        .scroll-hint-arrow { width:16px;height:16px;border-right:2px solid var(--scroll-hint);border-bottom:2px solid var(--scroll-hint);transform:rotate(45deg);transition:border-color 0.3s ease; }
        @keyframes shBounce { 0%,100%{transform:translateX(-50%) translateY(0);opacity:0.4} 50%{transform:translateX(-50%) translateY(10px);opacity:0.85} }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 44px 38px;
            text-align: center;
            box-shadow: var(--card-shadow);
            animation: cardFloat 6s ease-in-out infinite;
            position: relative;
            overflow: hidden;
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .card::before { content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--card-top-line),transparent); }
        @keyframes cardFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

        .header-title { font-size:13px;letter-spacing:4px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:8px;transition:color 0.3s ease; }
        .sefirah-badge { display:inline-block;background:var(--gold-faint);border:1px solid var(--border);border-radius:20px;padding:6px 18px;font-size:14px;color:var(--gold);margin-bottom:28px;letter-spacing:1px;transition:all 0.3s ease; }
        .day-number { font-size:clamp(90px,20vw,140px);font-weight:900;line-height:1;background:linear-gradient(180deg,#fffde7 0%,#f4c430 50%,#c8860a 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px;animation:numPulse 4s ease-in-out infinite;display:block; }
        body.light .day-number { background:linear-gradient(180deg,#5c3d2e 0%,#b8860b 50%,#8b5a2b 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
        @keyframes numPulse { 0%,100%{filter:drop-shadow(0 0 20px rgba(244,196,48,0.4))} 50%{filter:drop-shadow(0 0 40px rgba(244,196,48,0.8))} }
        .omer-text { font-size:clamp(18px,4vw,24px);font-weight:500;color:var(--text-primary);line-height:1.8;margin-bottom:8px;transition:color 0.3s ease; }
        .weeks-part { font-size:0.82em;color:var(--gold-dim);transition:color 0.3s ease; }

        .divider { width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:26px auto;transition:background 0.3s ease; }

        /* Blessing section */
        .bracha-section {
            background: var(--section-bg);
            border: 1px solid var(--section-border);
            border-radius: 16px;
            padding: 22px 20px;
            margin-bottom: 16px;
            text-align: center;
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        .section-label { font-size:11px;letter-spacing:3px;color:var(--gold-dim);margin-bottom:14px;text-transform:uppercase;transition:color 0.3s ease; }
        .bracha-text { font-size:clamp(16px,3.5vw,20px);color:var(--text-primary);line-height:2;direction:rtl;transition:color 0.3s ease; }
        .bracha-highlight { color:var(--gold);font-weight:700;transition:color 0.3s ease; }

        /* Harachaman */
        .harachaman-section {
            background: var(--gold-faintest);
            border: 1px solid var(--border-xlight);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        .harachaman-text { font-size:clamp(15px,3vw,18px);color:var(--text-secondary);line-height:2;direction:rtl;transition:color 0.3s ease; }

        /* Torah section */
        .torah-section {
            background: var(--gold-faint);
            border-radius: 16px;
            padding: 24px 20px;
            border: 1px solid var(--section-border);
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        .torah-period-title { font-size:clamp(17px,3.5vw,21px);font-weight:700;color:var(--gold);margin-bottom:14px;direction:rtl;line-height:1.4;transition:color 0.3s ease; }
        .torah-quote { font-size:clamp(16px,3.2vw,20px);font-weight:500;color:var(--text-primary);line-height:1.85;margin-bottom:8px;direction:rtl;transition:color 0.3s ease; }
        .torah-quote::before { content:'"';color:var(--gold);font-size:1.3em;font-weight:900; }
        .torah-quote::after { content:'"';color:var(--gold);font-size:1.3em;font-weight:900; }
        .torah-source { font-size:13px;color:var(--gold-dim);font-style:italic;margin-bottom:16px;transition:color 0.3s ease; }
        .torah-body { direction:rtl;border-top:1px solid var(--border-xlight);padding-top:14px;transition:border-color 0.3s ease; }
        .torah-body p { font-size:clamp(14px,2.8vw,16px);color:var(--text-secondary);line-height:2.05;margin-bottom:14px;transition:color 0.3s ease; }
        .torah-body p:last-child { margin-bottom:0; }
        .torah-body p.em { color:var(--gold-dim);transition:color 0.3s ease; }

        .date-display { margin-top:26px;font-size:13px;color:var(--text-muted);letter-spacing:1px;transition:color 0.3s ease; }
        .message-card { font-size:clamp(22px,5vw,32px);color:var(--text-primary);line-height:1.6;transition:color 0.3s ease; }
        .message-sub { font-size:16px;color:var(--gold-dim);margin-top:12px;transition:color 0.3s ease; }

        @media(max-width:480px){ .card{padding:30px 18px;} .moon{width:50px;height:50px;top:30px;left:30px;} }

        /* ── Top Navigation Bar ── */
        .top-nav {
            position: fixed; top: 0; right: 0; left: 0; z-index: 1000;
            background: var(--nav-bg);
            border-bottom: 1px solid var(--nav-border);
            backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center;
            height: 54px; gap: 0;
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        .nav-btn {
            background: none; border: none; cursor: pointer;
            font-family: 'Frank Ruhl Libre', serif;
            font-size: 15px; font-weight: 500;
            color: var(--nav-btn-color);
            padding: 0 28px; height: 100%;
            border-bottom: 2px solid transparent;
            transition: color 0.25s, border-color 0.25s;
            letter-spacing: 0.5px;
            display: flex; align-items: center; gap: 7px;
        }
        .nav-btn:hover { color: var(--nav-btn-hover); }
        .nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
        .nav-sep { width: 1px; height: 22px; background: var(--nav-sep); transition: background 0.3s ease; }

        /* ── Theme Toggle Button ── */
        .theme-toggle {
            position: absolute; left: 16px;
            background: none; border: 1px solid var(--border);
            border-radius: 20px; padding: 5px 12px;
            cursor: pointer; font-size: 16px;
            color: var(--gold); transition: all 0.3s ease;
            display: flex; align-items: center; gap: 5px;
            line-height: 1;
        }
        .theme-toggle:hover { background: var(--gold-faint); border-color: var(--gold); }

        /* ── Learning View ── */
        #learningView { display: none; position: relative; z-index: 10; padding-top: 70px; }
        #omerView { padding-top: 54px; }

        .learning-header {
            text-align: center; padding: 36px 20px 28px;
        }
        .learning-title {
            font-size: clamp(28px, 6vw, 42px); font-weight: 900;
            background: linear-gradient(180deg, #fffde7 0%, #f4c430 60%, #c8860a 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        body.light .learning-title {
            background: linear-gradient(180deg, #5c3d2e 0%, #b8860b 60%, #8b5a2b 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .learning-subtitle {
            font-size: 13px; letter-spacing: 4px; color: var(--gold-dim);
            text-transform: uppercase; transition: color 0.3s ease;
        }

        .tracks-container {
            max-width: 680px; margin: 0 auto; padding: 0 16px 60px;
            display: flex; flex-direction: column; gap: 20px;
        }

        /* ── Track Card ── */
        .track-card {
            background: var(--track-bg);
            border: 1px solid var(--track-border);
            border-radius: 20px;
            padding: 26px 24px 22px;
            position: relative; overflow: hidden;
            transition: border-color 0.3s, box-shadow 0.3s, background 0.3s ease;
        }
        .track-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--track-top-line), transparent);
        }
        .track-card:hover {
            border-color: var(--track-border-hover);
            box-shadow: 0 0 40px var(--track-glow-hover);
        }

        .track-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
        .track-info { flex: 1; }
        .track-icon { font-size: 24px; margin-bottom: 4px; }
        .track-title { font-size: 18px; font-weight: 700; color: var(--gold); margin-bottom: 3px; transition: color 0.3s ease; }
        .track-subtitle { font-size: 13px; color: var(--text-secondary); line-height: 1.5; transition: color 0.3s ease; }
        .track-current { font-size: 14px; color: var(--gold-dim); font-weight: 500; margin-top: 4px; transition: color 0.3s ease; }

        /* Progress bar */
        .progress-wrap { margin-bottom: 16px; }
        .progress-label { font-size: 11px; letter-spacing: 2px; color: var(--gold-dim); margin-bottom: 6px; text-transform: uppercase; transition: color 0.3s ease; }
        .progress-bar-bg {
            height: 4px; background: var(--progress-bg); border-radius: 2px; overflow: hidden; transition: background 0.3s ease;
        }
        .progress-bar-fill {
            height: 100%; background: linear-gradient(90deg, #c8860a, #f4c430);
            border-radius: 2px; transition: width 0.5s ease;
        }

        /* Buttons row */
        .track-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
        .btn-primary {
            background: linear-gradient(135deg, rgba(244,196,48,0.18), rgba(200,134,10,0.25));
            border: 1px solid rgba(244,196,48,0.4);
            color: #f4c430; font-family: 'Frank Ruhl Libre', serif;
            font-size: 14px; font-weight: 600;
            padding: 10px 20px; border-radius: 12px; cursor: pointer;
            transition: all 0.2s; letter-spacing: 0.3px;
        }
        .btn-primary:hover { background: rgba(244,196,48,0.28); border-color: rgba(244,196,48,0.7); }
        .btn-done {
            background: linear-gradient(135deg, rgba(72,210,100,0.15), rgba(40,160,70,0.2));
            border: 1px solid rgba(72,210,100,0.35);
            color: #6be08a; font-family: 'Frank Ruhl Libre', serif;
            font-size: 14px; font-weight: 600;
            padding: 10px 20px; border-radius: 12px; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-done:hover { background: rgba(72,210,100,0.25); border-color: rgba(72,210,100,0.6); }
        .btn-done.completed {
            background: rgba(72,210,100,0.1); opacity: 0.6; cursor: default;
        }
        .btn-back {
            background: none; border: none; cursor: pointer;
            font-family: 'Frank Ruhl Libre', serif;
            font-size: 12px; color: rgba(244,196,48,0.4);
            padding: 4px 0; text-decoration: underline;
            text-underline-offset: 3px; transition: color 0.2s;
        }
        .btn-back:hover { color: rgba(244,196,48,0.7); }

        /* Text panel */
        .text-panel {
            display: none;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(244,196,48,0.12);
            border-radius: 14px;
            padding: 20px 18px;
            margin-top: 14px;
            direction: rtl; text-align: right;
        }
        .text-panel.open { display: block; }
        .text-panel-title {
            font-size: 13px; letter-spacing: 2px; color: rgba(244,196,48,0.5);
            text-transform: uppercase; margin-bottom: 12px;
        }
        .text-panel-toggle {
            display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
        }
        .btn-toggle {
            background: rgba(244,196,48,0.08); border: 1px solid rgba(244,196,48,0.2);
            color: rgba(244,196,48,0.6); font-family: 'Frank Ruhl Libre', serif;
            font-size: 12px; padding: 5px 14px; border-radius: 8px;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-toggle.active { background: rgba(244,196,48,0.2); color: #f4c430; border-color: rgba(244,196,48,0.5); }
        .text-content {
            font-size: clamp(15px, 3.5vw, 18px);
            color: rgba(255,255,255,0.88);
            line-height: 2.1; direction: rtl;
        }
        .text-content .verse { display: block; margin-bottom: 6px; }
        .text-content .verse-num { color: rgba(244,196,48,0.5); font-size: 0.75em; margin-left: 6px; }

        /* Spinner */
        .spinner {
            display: flex; align-items: center; justify-content: center;
            padding: 24px; gap: 10px; color: rgba(244,196,48,0.5);
            font-size: 14px;
        }
        .spinner-ring {
            width: 22px; height: 22px; border: 2px solid rgba(244,196,48,0.2);
            border-top-color: #f4c430; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg { color: rgba(255,100,100,0.8); font-size: 14px; padding: 10px 0; text-align: center; }

        /* Targum toggle */
        .targum-text { color: rgba(255,255,255,0.55); font-style: italic; font-size: 0.92em; line-height: 1.9; margin-top: 8px; direction: rtl; }

        @media(max-width:480px){
            .track-card { padding: 20px 16px 18px; }

{ q:'אֵיזֶהוּ גִבּוֹר? הַכּוֹבֵשׁ אֶת יִצְרוֹ', s:'בן זומא, פרקי אבות ד, א', e:'אנו מכבדים גיבורים צבאיים — אך החכמים מגלים שהגבורה האמיתית היא פנימית. הכובש את יצרו — גיבור יותר מכובש ערים. כי הקרב הקשה ביותר הוא זה המתנהל בלב האדם.' },
// 9 - גבורה שבגבורה
{ q:'לְעוֹלָם יִהְיֶה אָדָם רַךְ כַּקָּנֶה וְאַל יְהֵא קָשֶׁה כָּאֶרֶז', s:'תלמוד בבלי, תענית כ, ב', e:'הרוח מכופף את הקנה — אבל הוא אינו נשבר. הרוח שוברת את הארז הגאה — אבל הוא נופל. הגמישות הפנימית היא עוצמה עצומה. הרוך אינו חולשה; הוא הגבורה הבשלה.' },
// 10 - תפארת שבגבורה
{ q:'בִּמְקוֹם שֶׁבַּעֲלֵי תְשׁוּבָה עוֹמְדִין, אֵין צַדִּיקִים גְּמוּרִים יְכוֹלִין לַעֲמוֹד', s:'תלמוד בבלי, ברכות לד, ב', e:'מי שכשל ושב — עולה גבוה יותר ממי שלא כשל מעולם. מדוע? כי הוא הכיר את חולשתו, נלחם ביצרו, ובחר לשוב. זוהי התשובה — לא מחיקת העבר, אלא הפיכתו לכנפיים.' },
// 11 - נצח שבגבורה
{ q:'כָּל כָּבוֹד בַּת מֶלֶךְ פְּנִימָה', s:'תהילים מה, יד', e:'הפסוק מדבר על בת המלך — הנשמה. כבודה האמיתי אינו בחיצוניות, בבגדים או בתואר — אלא בעולמה הפנימי, בנשמתה, בטוהרה. מה שנמצא בפנים — זה שנצחי.' },
// 12 - הוד שבגבורה
{ q:'אֵיזֶהוּ עָשִׁיר? הַשָּׂמֵחַ בְּחֶלְקוֹ', s:'בן זומא, פרקי אבות ד, א', e:'בן זומא הופך את המושג עושר על פיו. עשיר אינו מי שיש לו הכי הרבה — אלא מי שרוצה את מה שיש לו. השמחה בחלקנו היא אמנות: לראות ברכה במה שניתן לנו.' },
// 13 - יסוד שבגבורה
{ q:'לְפוּם צַעֲרָא אַגְרָא', s:'פרקי אבות ה, כג', e:'ממשנה עמוקה: השכר הוא פרופורציונלי לטרחה ולמאמץ. לא רק בגן עדן — אלא בחיים עצמם. מה שקשה להשיג — יקר יותר. המאמץ הוא חלק מהמתנה.' },
// 14 - מלכות שבגבורה
{ q:'אֵין הַבַּיְשָׁן לָמֵד וְאֵין הַקַּפְּדָן מְלַמֵּד', s:'פרקי אבות ב, ה', e:'הלמידה דורשת אומץ — לשאול שאלות, להודות שאינך יודע. ההוראה דורשת סבלנות — לפגוש את התלמיד היכן שהוא נמצא. כך נבנות הממלכות של דעת.' },
// 15 - חסד שבתפארת
{ q:'כָּל יִשְׂרָאֵל עֲרֵבִים זֶה בָּזֶה', s:'תלמוד בבלי, שבועות לט, א', e:'ערבות — לשון ערב, לשון ערוב. כולנו קשורים זה בזה כחוטים שנארגו יחד. כשאחד נופל — כולם מרגישים. כשאחד עולה — כולם מתרוממים. זו האחריות ההדדית של עם ישראל.' },
// 16 - גבורה שבתפארת
{ q:'הֱוֵי מִתַּלְמִידָיו שֶׁל אַהֲרֹן, אוֹהֵב שָׁלוֹם וְרוֹדֵף שָׁלוֹם', s:'הלל, פרקי אבות א, יב', e:'הלל בוחר בדגם של אהרן — לא משה. אהרן לא הוריד תורה מהשמים, אבל הוא היה שלום. הוא היה זה שהלך בין אנשים ריבנים וחיבר ביניהם. לרדוף שלום — זו מלאכה אקטיבית, לא פסיבית.' },
// 17 - תפארת שבתפארת
{ q:'שְׁמַע יִשְׂרָאֵל ה\' אֱלֹהֵינוּ ה\' אֶחָד', s:'דברים ו, ד', e:'הפסוק הנשגב ביותר ביהדות. לא "שמע" — שמיעה פסיבית. אלא קבלת מלכות שמים מחדש בכל יום. האחדות האלוהית אינה רק עובדה תיאולוגית — היא גם הזמנה: שגם אנחנו נהיה אחד.' },
// 18 - נצח שבתפארת
{ q:'כָּל אֶחָד וְאֶחָד חַיָּב לוֹמַר: בִּשְׁבִילִי נִבְרָא הָעוֹלָם', s:'משנה סנהדרין ד, ה', e:'המשנה מחייבת כל אדם לדעת שהעולם כולו שווה כנגדו. זהו לא גאווה — זוהי אחריות. אם כל העולם נברא בשבילי, אין לי רשות לחיות חיי בינוניות. אני חייב לעשות משהו גדול.' },
// 19 - הוד שבתפארת
{ q:'אֲנִי לְדוֹדִי וְדוֹדִי לִי', s:'שיר השירים ו, ג', e:'ראשי התיבות של "אני לדודי ודודי לי" — אלול. חודש הרחמים. הפסוק מתאר יחסי אהבה הדדיים: לא רק אנחנו מחפשים את הקב"ה — הוא מחפש אותנו. זוהי ההזמנה לשוב.' },
// 20 - יסוד שבתפארת
{ q:'וְאָהַבְתָּ לְרֵעֲךָ כָּמוֹךָ — זֶה כְּלָל גָּדוֹל בַּתּוֹרָה', s:'רבי עקיבא, ספרא קדושים', e:'רבי עקיבא — שעצמו גדל מאפס ועלה לגדולה — בוחר בפסוק הזה ככלל הגדול בתורה. אהבת הרע אינה רגש — היא מעשה: לחשוב על האחר לפני שאתה פועל.' },
// 21 - מלכות שבתפארת
{ q:'רָאִיתִי בְּנֵי עֲלִיָּה וְהֵם מֻעָטִים', s:'רבי שמעון בר יוחאי, סוכה מה, ב', e:'רשב"י מגלה שגדולה אמיתית היא נחלתם של מעטים — לא כי הדרך סגורה, אלא כי מעטים בוחרים ללכת בה. ל"ג בעומר — יום הילולת רשב"י — הוא חגיגת האור שבתוך החושך.' },
// 22 - חסד שבנצח
{ q:'הֱוֵי דָן אֶת כָּל הָאָדָם לְכַף זְכוּת', s:'יהושע בן פרחיה, פרקי אבות א, ו', e:'לדון לכף זכות זו אמנות. זה אומר: לפני שאתה שופט — עצור. שאל את עצמך: האם ייתכן שיש פה הסבר אחר? חיים של דן לכף זכות הם חיים עם פחות כעס ויותר שלווה.' },
// 23 - גבורה שבנצח
{ q:'כָּל הַמְקַיֵּם נֶפֶשׁ אַחַת — מַעֲלֶה עָלָיו הַכָּתוּב כְּאִלּוּ קִיֵּם עוֹלָם מָלֵא', s:'משנה סנהדרין ד, ה', e:'ולהפך — המאבד נפש אחת כאילו איבד עולם מלא. כל אדם הוא עולם שלם. זוהי הסיבה שחיי אדם הם קדושים מכל — לא ניתן לשקלל אותם, לא ניתן לוותר עליהם.' },
// 24 - תפארת שבנצח
{ q:'אִם אֵין אֲנִי לִי — מִי לִי? וּכְשֶׁאֲנִי לְעַצְמִי — מָה אֲנִי? וְאִם לֹא עַכְשָׁיו — אֵימָתַי?', s:'הלל, פרקי אבות א, יד', e:'שלוש שאלות שמכילות את כל פילוסופיית החיים: אחריות לעצמך, אחריות לאחרים, ודחיפות. הלל שואל: אם לא עכשיו — אימתי? מחר הוא לא מובטח.' },
// 25 - נצח שבנצח
{ q:'יָגַעְתִּי וְלֹא מָצָאתִי — אַל תַּאֲמִין. לֹא יָגַעְתִּי וּמָצָאתִי — אַל תַּאֲמִין', s:'תלמוד בבלי, מגילה ו, ב', e:'עקרון ממלכותי בעולם הרוחני והגשמי כאחד: אין קיצורי דרך לדברים שראויים. יגיעה — היא המפתח. לא הכשרון, לא המזל — היגיעה.' },
// 26 - הוד שבנצח
{ q:'גַּם זוּ לְטוֹבָה', s:'רבי נחום איש גמזו, תענית כא, א', e:'רבי נחום חי חיים של סבל פיזי קשה — ועם זאת אמר על כל דבר "גם זו לטובה". זה לא אופטימיות שטחית. זו אמונה עמוקה שהכל — גם מה שנראה רע — הוא חלק ממהלך גדול יותר.' },
// 27 - יסוד שבנצח
{ q:'צַדִּיק בֶּאֱמוּנָתוֹ יִחְיֶה', s:'חבקוק ב, ד', e:'הנביא חבקוק, שראה סבל ורשע, הגיע למסקנה אחת: הצדיק יחיה — לא בזכות כוחו או חוכמתו — אלא באמונתו. האמונה היא עוגן שמחזיק גם כשהסערה הכי חזקה.' },
// 28 - מלכות שבנצח
{ q:'כִּי נֵר מִצְוָה וְתוֹרָה אוֹר', s:'משלי ו, כג', e:'שלמה המלך מבחין: מצוה — נר. תורה — אור. הנר מאיר רגע; האור ממשיך. כל מצוה שאדם עושה היא נר קטן — אבל התורה שלומד ומנחיל לדורות הבאים — אור עולם.' },
// 29 - חסד שבהוד
{ q:'חַיָּב אָדָם לְבָרֵךְ עַל הָרָעָה כְּשֵׁם שֶׁהוּא מְבָרֵךְ עַל הַטּוֹבָה', s:'משנה ברכות ט, ה', e:'מדוע? כי אנחנו רואים רק את ההווה — הקב"ה רואה את התמונה המלאה. מה שנראה לנו רע עכשיו — אולי הוא ממש הטובה הגדולה שמגיעה לנו. ברכה על הרעה היא אמון בסיפור הגדול.' },
// 30 - גבורה שבהוד
{ q:'הוֹדוּ לַה\' כִּי טוֹב, כִּי לְעוֹלָם חַסְדּוֹ', s:'תהילים קז, א', e:'הפסוק שחוזר שוב ושוב בתהילים. "לעולם" — לא רק כרגע, לא רק כשטוב לנו. חסד ה\' הוא נצחי, גם כשאנחנו לא מרגישים אותו. ההודיה מזמינה אותנו לראות מעבר לרגע הנוכחי.' },
// 31 - תפארת שבהוד
{ q:'לְעוֹלָם יִרְאֶה אָדָם עַצְמוֹ כְּאִלּוּ חֶצְיוֹ חַיָּב וְחֶצְיוֹ זַכַּאי', s:'תלמוד בבלי, קידושין מ, ב', e:'פועל יוצא מדהים מהמשנה: עשה מצוה אחת — הכרעת את עצמך ואת העולם לכף זכות. חטאת — הכרעת הכל לכף חובה. כל מעשה קטן — משנה את המאזניים של העולם.' },
// 32 - נצח שבהוד
{ q:'כָּל דִּבּוּרֵי הַתּוֹרָה — כְּגַחֲלֵי אֵשׁ! כִּי הַתּוֹרָה נִקְרֵאת "אֵשׁ דָּת"', s:'רשב"י — רבי שמעון בר יוחאי, ספרי דברים', e:'🔥 לג בעומר — יום ההילולא של רשב"י! הוא גילה שהתורה אינה ספר חוקים יבש — היא אש חיה. ממנו יצא הזוהר הקדוש, ים של אור. יהי זכרו ברוך לעד.' },
// 33 - הוד שבהוד
{ q:'כָּל הָאוֹמֵר דָּבָר בְּשֵׁם אוֹמְרוֹ — מֵבִיא גְאֻלָּה לָעוֹלָם', s:'פרקי אבות ו, ו', e:'אסתר אמרה לאחשורוש "בשם מרדכי" — ובזה הובאה הגאולה. לייחס דברים למקורם זה לא רק הגינות — זה פעולה רוחנית שמביאה אור. כשאתה מוסר בשם מישהו — אתה מחבר עולמות.' },
// 34 - יסוד שבהוד
{ q:'בְּכָל דּוֹר וָדוֹר חַיָּב אָדָם לִרְאוֹת אֶת עַצְמוֹ כְּאִלּוּ הוּא יָצָא מִמִּצְרַיִם', s:'הגדה של פסח, על פי משנה פסחים י, ה', e:'לא רק לזכור את יציאת מצרים — אלא לחוות אותה. כל אחד מאיתנו יצא ממצרים — מהמצרים שלו, מהכלא הפנימי שלו. החירות היא לא רק היסטוריה — היא אפשרות יומיומית.' },
// 35 - מלכות שבהוד
{ q:'מַלְכוּת שָׁמַיִם שְׁלֵמָה אֵינָהּ מִתְגַּלָּה אֶלָּא בִּשְׂמָחָה', s:'ספר בעל שם טוב', e:'הבעל שם טוב מגלה: הקב"ה אינו שורה בתוך עצבות. השכינה שורה רק מתוך שמחה של מצוה. לכן — שמחה אינה מותרות רוחנית; היא תנאי לנוכחות האלוהית.' },
// 36 - חסד שביסוד
{ q:'כָּל יִשְׂרָאֵל יֵשׁ לָהֶם חֵלֶק לָעוֹלָם הַבָּא', s:'משנה סנהדרין י, א', e:'פתיחת פרק "חלק" — אחד הפרקים העמוקים במשנה. כל אחד מישראל — ללא יוצא מן הכלל — יש לו חלק לעולם הבא. זה לא פרס — זה עובדה. השאלה היא רק מה נעשה איתו בינתיים.' },
// 37 - גבורה שביסוד
{ q:'לֹא עָלֶיךָ הַמְּלָאכָה לִגְמוֹר, וְלֹא אַתָּה בֶּן חוֹרִין לִבָּטֵל מִמֶּנָּה', s:'רבי טרפון, פרקי אבות ב, טז', e:'אחת הפסקאות הגדולות בתולדות המחשבה היהודית. אין חובה להשלים — יש חובה להתחיל ולהמשיך. הפטור מן הניצחון אינו פטור מן המאמץ. כל צעד קטן הוא עולם שלם.' },
// 38 - תפארת שביסוד
{ q:'שָׁלוֹם שָׁלוֹם לָרָחוֹק וְלַקָּרוֹב', s:'ישעיהו נז, יט', e:'ישעיהו מגלה שהשלום האלוהי מגיע קודם לרחוק ואחר כך לקרוב. מדוע? כי הרחוק יותר זקוק לו, וגם כי שלום שמגשר על מרחק גדול — הוא שלום אמיתי יותר.' },
// 39 - נצח שביסוד

// ── Contextual Torah content (1-minute read, relevant to current period) ──
function getContextualTorah(omerDay) {
    // Determine halachic civil date (Israel time)
    const nowUTC = new Date();
    const nowIL = new Date(nowUTC.getTime() + 3 * 3600 * 1000);
    const h = nowIL.getUTCHours();
    const d = new Date(Date.UTC(nowIL.getUTCFullYear(), nowIL.getUTCMonth(), nowIL.getUTCDate()));
    if (h < 20) d.setUTCDate(d.getUTCDate() - 1); // before nightfall = previous Jewish day

    // Special dates 5786 / 2026
    const CHOL_START  = Date.UTC(2026, 3, 3);  // 16 Nisan — Chol HaMoed begins
    const CHOL_END    = Date.UTC(2026, 3, 7);  // 20 Nisan
    const SHVII       = Date.UTC(2026, 3, 8);  // 21 Nisan — Shvi'i shel Pesach
    const t = d.getTime();

    if (t >= CHOL_START && t <= CHOL_END) return {
        period: 'חול המועד פסח',
        title: 'חירות — לא רק מאירוע אלא מצב פנימי',
        quote: 'בְּכָל דּוֹר וָדוֹר חַיָּב אָדָם לִרְאוֹת אֶת עַצְמוֹ כְּאִלּוּ הוּא יָצָא מִמִּצְרַיִם',
        source: 'הגדה של פסח — משנה פסחים י, ה',
        body: `<p>חז"ל לא אמרו לזכור שיצאנו ממצרים — הם אמרו <em>לראות את עצמנו כאילו אנחנו יצאנו</em>. ההבדל עצום. זיכרון הוא פסיבי; ראייה כזו היא חוויה חיה, מחודשת.</p>
<p>החירות שהתורה מדברת עליה אינה רק שחרור מעבדות — היא מצב פנימי. כל שנה פסח שואל: מאילו כבלים שלי אני עדיין לא חופשי? הרגלים ישנים, פחדים, תבניות חשיבה שמשעבדות מבפנים לפעמים חזק יותר ממצרים.</p>
<p class="em">ימי חול המועד הם "ימי ביניים" — לא חג מלא, אך גם לא יום רגיל. זה לא מקרה. הקדושה לא שייכת רק לשבת ויום טוב — היא יכולה לחדור לתוך שגרת החיים. השאלה היא אם אנחנו פתוחים לה.</p>
<p>ספירת העומר שמתחילה ממש עכשיו מלמדת שהחירות אינה נקודה אלא מסע. לצאת ממצרים — זה הצעד הראשון; להגיע להר סיני ולקבל תורה — זה היעד. 49 יום של עבודה פנימית, יום אחד בכל פעם.</p>`
    };

    if (t === SHVII) return {
        period: 'שביעי של פסח',
        title: 'קריעת ים סוף — כשהנס בא תוך כדי הצעד',
        quote: 'אָז יָשִׁיר מֹשֶׁה וּבְנֵי יִשְׂרָאֵל אֶת הַשִּׁירָה הַזֹּאת',
        source: 'שמות טו, א',
        body: `<p>בני ישראל יצאו ממצרים — אך עדיין לא היו חופשיים לגמרי. פרעה רדף מאחור, הים חסם מלפנים. הפחד היה מוחשי. ואז — קריעת ים סוף.</p>
<p>רבי נחמן מברסלב לימד: הים נקרע רק כאשר נחשון בן עמינדב קפץ למים עד צווארו. הנס לא קדם לאמונה — הוא בא <em>תוך כדי</em> הצעד האמיץ. האמונה לא ממתינה לוודאות; היא מתגלה בתנועה.</p>
<p class="em">"אָז יָשִׁיר מֹשֶׁה" — לא "שר" אלא "ישיר", לשון עתיד. חז"ל למדו מכאן רמז לתחיית המתים: שירת הים עוד תושר שוב. אך יש כאן גם מסר מיידי — השיר הגדול בא רק אחרי שעברת דרך המים. אי אפשר לשיר אותו קודם.</p>
<p>שביעי של פסח הוא הזמנה: לקפוץ למים, לצעוד קדימה בלי כל הבטחות, ולגלות שהים נקרע בדיוק בצעד שחשבת שהוא האחרון שלך.</p>`
    };

    // Lag BaOmer
    if (omerDay === 33) return {
        period: 'ל״ג בעומר',
        title: 'יום ההילולה של רשב"י — האור הנסתר מתגלה',
        quote: 'כָּל חַיַּי לֹא הָיִיתִי מִתְבַּיֵּשׁ מִדְּבָרַי',
        source: 'רבי שמעון בר יוחאי — תלמוד בבלי, סוכה מה, ב',
        body: `<p>ביום פטירתו ביקש רשב"י שיחגגו ולא שיבכו. "יומא דחדוותא הוא" — זה יום שמחה. לא כי מת, אלא כי ביום זה גילה לתלמידיו את סודות התורה הכי עמוקים, ונשמתו עלתה בשלמות.</p>
<p>רשב"י חי שלוש עשרה שנה במערה, נחבא מהרומאים עם בנו. שם, מנותק לגמרי מהעולם, הוא קיבל גילויים עמוקים שהפכו לזוהר הקדוש. כשיצא בפעם הראשונה — כל מה שהסתכל עליו נשרף מעוצמת הקדושה. נאלץ לחזור. בפעם השנייה — הצליח לחיות בעולם הזה.</p>
<p class="em">הזוהר מלמד שישנו "אור נסתר" — אור שנגנז בתחילת הבריאה ועתיד להתגלות לצדיקים לעתיד לבוא. ל"ג בעומר הוא רגע שבו אור זה מבצבץ לתוך עולמנו.</p>
<p>מה הניצוץ הנסתר בתוכך שטרם הוצאת לאור? ל"ג בעומר הוא הזמן הנכון לשאול.</p>`
    };

    // Week-based content
    const week = Math.ceil(omerDay / 7);
    const weeks = [
        null,
        { period:'שבוע א׳ — חֶסֶד', title:'לבנות עולם של נתינה', quote:'עוֹלָם חֶסֶד יִבָּנֶה', source:'תהילים פט, ג',
          body:`<p>השבוע הראשון של הספירה מוקדש למידת החסד — הספירה הראשונה, הקרובה ביותר לאין-סוף. חסד הוא נתינה ללא תנאי, אהבה שאינה מחפשת תמורה.</p>
<p>אברהם אבינו הוא הדגם המוחלט: יושב בפתח אוהלו ביום חם, שלושה ימים אחרי מילה — ורץ לקראת אורחים. כל ביתו פתוח לכל רוח. אך חז"ל מלמדים שחסד אמיתי דורש גם בינה — לתת את מה שהאחר <em>באמת</em> צריך, לא רק מה שנוח לנו לתת.</p>
<p class="em">לפעמים החסד הגדול ביותר הוא דווקא לומר "לא", לדחוף את האחר לעמוד על רגליו. נתינה שמנוונת את מי שמקבל — אינה חסד שלם.</p>
<p>בשבוע זה, שאלו: למי סביבי אני יכול לתת? לא בהכרח כסף — זמן, קשב, חיוך, מילת עידוד. "עולם חסד יבנה" — כל מעשה נתינה בונה עולם.</p>` },
        { period:'שבוע ב׳ — גְּבוּרָה', title:'הגיבור שמנצח את עצמו', quote:'אֵיזֶהוּ גִבּוֹר? הַכּוֹבֵשׁ אֶת יִצְרוֹ', source:'בן זומא — פרקי אבות ד, א',
          body:`<p>בן זומא הופך את כל מה שחשבנו שגבורה היא. לא הגיבור הצבאי, לא מי שמנצח בקרב — אלא מי שמנצח את <em>עצמו</em>.</p>
<p>גבורה היא הכוח לעצור. לא לפצוח עם התגובה הראשונה שעולה. לבחור בשתיקה כשהכעס בוער. לדחות סיפוק מיידי לטובת דבר חשוב יותר. יצחק אבינו — שהגבורה שלו — עמד על המזבח בעקידה ולא ברח. לא כי לא פחד, אלא כי בחר. הגבורה האמיתית אינה היעדר פחד — היא פעולה נכונה <em>למרות</em> הפחד.</p>
<p class="em">הגמרא אומרת: "לעולם יהיה אדם רך כקנה ואל יהא קשה כארז". הקנה מתכופף ברוח ואינו נשבר. הארז הגאה — נופל. הגמישות הפנימית היא עוצמה.</p>
<p>בשבוע זה, תרגלו גבורה אחת קטנה ביום: לוותר על משהו, לשמור על זמן לימוד למרות העומס, לאכול בריא כשרוצים ג'אנק. כל פעם שמנצחים את היצר הקטן — בונים שריר שישרת בקרבות הגדולים.</p>` },
        { period:'שבוע ג׳ — תִּפְאֶרֶת', title:'יופי שבאמת — מצוא את האיזון', quote:'דְּרָכֶיהָ דַרְכֵי נֹעַם וְכָל נְתִיבוֹתֶיהָ שָׁלוֹם', source:'משלי ג, יז',
          body:`<p>תפארת היא האיזון המושלם בין חסד לגבורה — בין נתינה ללא גבול לבין דין קפדני. יעקב אבינו הוא האיש של תפארת: הוא גם נלחם עם המלאך עד עלות השחר, וגם בכה על צווארו של עשיו אחיו.</p>
<p>תפארת פירושה גם יופי — לא יופי שטחי, אלא היופי שבדבר האמיתי, השלם, המאוזן. הרמב"ם בספרו "שמונה פרקים" כותב שמידות טובות הן תמיד <em>דרך האמצע</em>. נדיבות יתר עלולה לבזבז; קמצנות — לכלוא. האמת נמצאת בין הקצוות.</p>
<p class="em">כשאנו אומרים "תפארת ישראל" — אנחנו מדברים על הגאווה הפנימית של מי שהוא באמת מה שהוא. לא מבצג, לא מתכחש — אלא שלם עם עצמו.</p>
<p>מצאו בשבוע זה דבר אחד בחיים שאינו בשיווי משקל. תנו לו תפארת — מצאו את הביניים שלו.</p>` },
        { period:'שבוע ד׳ — נֶצַח', title:'עקשנות קדושה — ממשיכים גם כשלא רואים', quote:'נֶצַח יִשְׂרָאֵל לֹא יְשַׁקֵּר', source:'שמואל א, טו, כט',
          body:`<p>נצח — ניצחון, נצחיות, התמדה. השורש אחד. מי שמתמיד — מנצח. מי שמנצח — נצחי.</p>
<p>משה רבינו לא ויתר על העם אפילו כשהקב"ה עצמו הציע: "הנח לי ואשמידם ואעשה אותך לגוי גדול". משה סירב. 49 פעמים בא לפרעה. 40 שנה הוביל עם קשה עורף במדבר. "גַּם כִּי אֵלֵךְ בְּגֵיא צַלְמָוֶת לֹא אִירָא רָע" — דוד לא הבטיח שלא יהיו צרות, אלא שלא יפחד.</p>
<p class="em">האמונה היהודית עצמה היא דוגמה חיה של נצח: אלפי שנות גלות ועינויים, ועם ישראל ממשיך לשמור שבת, ללמוד תורה, לחגוג פסח. זה לא נוחות — זו בחירה.</p>
<p>הנצח שואל: על מה אתה לא מוותר? מה המטרה שאתה עוקב אחריה גם כשלא רואים תוצאות? הזהו אותה — ושמרו עליה.</p>` },

          body:`<p>הוד הוא אחד המושגים הקשים ביותר לתרגום. Splendor? Glory? הקרוב ביותר: הקרנה שבאה מתוך ענווה. ההוד של מי שאינו מחפש אישור — כי הוא יודע מה ערכו.</p>
<p>אהרן הכהן הוא איש ההוד. כשמשה חזר ממדיין, כתוב: "וְרָאַה אֹתְךָ וְשָׂמַח בְּלִבּוֹ" — אהרן שמח בשמחת אחיו כאילו היא שמחתו שלו. זוהי גדולה נדירה: לא לקנא, אלא לשמוח בהצלחת האחר. מעטים מגיעים לשם.</p>
<p class="em">הוד קשור להכרת הטוב — "להודות" ו"הוד" מאותו שורש. להיות נוכח בברכות שיש לנו, לא רק ברדיפה אחרי מה שחסר. ההוד הוא ראיית האור שכבר נמצא.</p>
<p>בשבוע זה, כתבו בכל בוקר שלושה דברים שאתם מכירים בהם תודה — לא הגדולות, דווקא הקטנות. כוס קפה חמה. שיחה טובה. שמש. שם מתחיל ההוד.</p>` },

          body:`<p>יסוד הוא הבסיס שעליו הכל עומד — לא רק פיזי, אלא הברית, ההתחייבות, הנאמנות. יוסף הצדיק הוא איש היסוד: עמד בפיתוי הגדול, לא בגד, שמר על אמת גם כשאף אחד לא ראה. בזכות יסוד שלו — כל שבטי ישראל שרדו.</p>
<p>היסוד הוא גם חיבור בין עליונים לתחתונים, בין שמים לארץ. בלי יסוד, כל בניין נופל — לא משנה כמה יפה הוא נראה מבחוץ. כמה פעמים ראינו דברים גדולים שהתפוררו כי לא הייתה להם אמת בפנים?</p>
<p class="em">ישנו ניסוח יפה מהחסידות: "כשאדם יודע מה ה-יסוד שלו — הוא יודע מי הוא". מה הדבר שאם תסיר אותו מחיייך — הכל קורס? אותו דבר הוא היסוד שלך.</p>
<p>בשבוע זה, בדקו אחת ההתחייבויות שלכם — לאדם קרוב, לעצמכם, לעקרון. האם היא עדיין שלמה? היסוד צריך תחזוקה.</p>` },

function getOmerFormula(day) {
    const weeks = Math.floor(day / 7);
    const remaining = day % 7;
    let dayPart = day === 1 ? 'יוֹם אֶחָד' : hebrewNumbers[day] + ' יָמִים';
    let weeksPart = '';
    if (weeks > 0) {
        weeksPart = ' שֶׁהֵם ' + weekNames[weeks];
        if (remaining === 1) weeksPart += ' וְיוֹם אֶחָד';
        else if (remaining > 1) weeksPart += ' וְ' + hebrewNumbers[remaining] + ' יָמִים';
    }
    return { dayPart, weeksPart };
}

function getTodayOmerDay() {
    // Israel is UTC+3 in April (IDT). Add offset manually — avoids toLocaleString browser inconsistencies.
    const nowUTC = new Date();
    const israelOffsetMs = 3 * 60 * 60 * 1000;
    const nowIsrael = new Date(nowUTC.getTime() + israelOffsetMs);

    const hour = nowIsrael.getUTCHours();

    // Nightfall (צאת הכוכבים) approximation for Israel in April: ~20:00 IDT
    const isAfterNightfall = hour >= 20;

    // Build today's date in Israel (UTC-based, after applying offset)
    const halachicDate = new Date(Date.UTC(
        nowIsrael.getUTCFullYear(),
        nowIsrael.getUTCMonth(),
        nowIsrael.getUTCDate()
    ));
    // Before nightfall = still on the previous Jewish day
    if (!isAfterNightfall) {
        halachicDate.setUTCDate(halachicDate.getUTCDate() - 1);
    }

    const start = new Date(Date.UTC(2026, 3, 2)); // April 2, 2026 — Day 1 of Omer
    return Math.floor((halachicDate - start) / 86400000) + 1;
}

function getHebrewDate() {
    return new Date().toLocaleDateString('he-IL', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}

// ── LocalStorage helpers ──
function loadProgress() {
    try {
        const raw = localStorage.getItem('torahLearning');
        if (raw) return JSON.parse(raw);
    } catch(e) {}
    return { parasha: { parashaIndex: 0, aliyahIndex: 0 }, mishna: { masechetIndex: 0, perekIndex: 0 }, tanakh: { seferIndex: 0, perekIndex: 0 } };
}
function saveProgress(prog) {
    localStorage.setItem('torahLearning', JSON.stringify(prog));
}

// ── State ──
let prog = loadProgress();
let parashaTextMode = 'heb'; // 'heb' | 'targum'
let parashaFetched = { heb: null, targum: null };
let mishnaFetched = null;
let tanakhFetched = null;
let parashaOpen = false;
let mishnaOpen = false;

// ── Parasha helpers ──
function getCurrentParasha() {
    // Find current shabbat's parasha based on today's date
    const today = new Date();
    today.setHours(0,0,0,0);
    // Find the first parasha whose shabbat is >= today, or the last one
    for (let i = 0; i < PARASHA_SCHEDULE.length; i++) {
        if (PARASHA_SCHEDULE[i].shabbat >= today) return i;
    }
    return PARASHA_SCHEDULE.length - 1;
}

function getParashaIndex() {
    // If user has set a parashaIndex in progress use it, otherwise auto-detect
    return prog.parasha.parashaIndex;
}

function initParashaAutoDetect() {
    // Only auto-set if the user hasn't manually advanced (still at index 0 aliyah 0)
    const autoIdx = getCurrentParasha();
    if (prog.parasha.parashaIndex === 0 && prog.parasha.aliyahIndex === 0) {
        prog.parasha.parashaIndex = autoIdx;
        saveProgress(prog);
    }
}

function updateParashaUI() {
    const pIdx = prog.parasha.parashaIndex;
    const aIdx = prog.parasha.aliyahIndex;
    if (pIdx >= PARASHA_SCHEDULE.length) {
        document.getElementById('parashaSubtitle').textContent = 'כל הפרשות הושלמו! 🎉';
        return;
    }
    const p = PARASHA_SCHEDULE[pIdx];
    document.getElementById('parashaSubtitle').textContent = 'פרשת ' + p.name;
    const aliyahNames = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שביעי'];
    const aName = aliyahNames[aIdx] || (aIdx+1);
    document.getElementById('parashaCurrentAliyah').textContent = 'עלייה ' + aName;
    const total = p.aliyot.length;
    const pct = Math.round(((aIdx) / total) * 100);
    document.getElementById('parashaProgressLabel').textContent = 'עלייה ' + (aIdx+1) + ' מתוך ' + total;
    document.getElementById('parashaProgressBar').style.width = Math.max(6, pct) + '%';
}

function toggleParashaText() {
    const panel = document.getElementById('parashaTextPanel');
    if (parashaOpen) {
        panel.classList.remove('open');
        parashaOpen = false;
    } else {
        panel.classList.add('open');
        parashaOpen = true;
        fetchParashaText();
    }
}

function showParashaMode(mode) {
    parashaTextMode = mode;
    document.getElementById('btnHeb').classList.toggle('active', mode === 'heb');
    document.getElementById('btnTargum').classList.toggle('active', mode === 'targum');
    renderParashaText();
    if (mode === 'targum' && !parashaFetched.targum) {
        fetchParashaText(true);
    }
}

async function fetchParashaText(targumOnly = false) {
    const pIdx = prog.parasha.parashaIndex;
    const aIdx = prog.parasha.aliyahIndex;
    if (pIdx >= PARASHA_SCHEDULE.length) return;
    const ref = PARASHA_SCHEDULE[pIdx].aliyot[aIdx];
    const cacheKey = 'parasha_' + ref;
    const cacheKeyT = 'parasha_t_' + ref;

    if (!targumOnly) {
        // Fetch Hebrew
        if (parashaFetched.heb) { renderParashaText(); return; }
        const cached = sessionStorage.getItem(cacheKey);
        if (cached) { parashaFetched.heb = JSON.parse(cached); renderParashaText(); }
        else {
            showSpinner('parashaTextContent');
            try {
                const url = 'https://www.sefaria.org/api/texts/' + encodeURIComponent(ref) + '?lang=he&commentary=0';
                const r = await fetch(url);
                const data = await r.json();
                parashaFetched.heb = data;
                sessionStorage.setItem(cacheKey, JSON.stringify(data));
                renderParashaText();
            } catch(e) { showError('parashaTextContent', 'שגיאה בטעינת הטקסט. אנא נסה שוב.'); }
        }
    } else {
        // Fetch Targum Onkelos
        if (parashaFetched.targum) { renderParashaText(); return; }
        const cached = sessionStorage.getItem(cacheKeyT);
        if (cached) { parashaFetched.targum = JSON.parse(cached); renderParashaText(); return; }
        showSpinner('parashaTextContent');
        try {
            // Sefaria: Onkelos texts are named "Onkelos Genesis 1:1-2:3" etc.
            const onkelosRef = 'Onkelos ' + ref;
            const url = 'https://www.sefaria.org/api/texts/' + encodeURIComponent(onkelosRef) + '?lang=he&commentary=0';
            const r = await fetch(url);
            const data = await r.json();
            if (!data.he || (Array.isArray(data.he) && data.he.length === 0)) throw new Error('empty');
            parashaFetched.targum = data;
            sessionStorage.setItem(cacheKeyT, JSON.stringify(data));
            renderParashaText();
        } catch(e) {
            showError('parashaTextContent', 'תרגום אונקלוס אינו זמין כרגע.');
        }
    }
}

function renderParashaText() {
    const el = document.getElementById('parashaTextContent');
    const mode = parashaTextMode;
    const data = mode === 'heb' ? parashaFetched.heb : parashaFetched.targum;
    if (!data) { if (mode === 'targum') fetchParashaText(true); return; }

    // Strip taamim for Hebrew; Onkelos (Aramaic) has no taamim anyway
    const verses = flattenText(mode === 'heb' ? (data.he || data.text) : (data.he || data.text), true);
    if (!verses || verses.length === 0) { el.innerHTML = '<div class="error-msg">הטקסט אינו זמין כרגע</div>'; return; }

    let html = '<div class="text-content">';
    verses.forEach((v, i) => {
        if (v && v.trim()) {
            html += '<span class="verse"><span class="verse-num">' + (i+1) + '</span>' + v + '</span>';
        }
    });
    html += '</div>';
    el.innerHTML = html;
}

function markParashaDone() {
    parashaFetched = { heb: null, targum: null };
    parashaOpen = false;
    document.getElementById('parashaTextPanel').classList.remove('open');
    const p = PARASHA_SCHEDULE[prog.parasha.parashaIndex];
    if (!p) return;
    prog.parasha.aliyahIndex++;
    if (prog.parasha.aliyahIndex >= p.aliyot.length) {
        prog.parasha.aliyahIndex = 0;
        prog.parasha.parashaIndex++;
    }
    saveProgress(prog);
    updateParashaUI();
    flashDone('parashaDoneBtn');
}

function goBackParasha() {
    parashaFetched = { heb: null, targum: null };
    parashaOpen = false;
    document.getElementById('parashaTextPanel').classList.remove('open');
    if (prog.parasha.aliyahIndex > 0) {
        prog.parasha.aliyahIndex--;
    } else if (prog.parasha.parashaIndex > 0) {
        prog.parasha.parashaIndex--;
        const prev = PARASHA_SCHEDULE[prog.parasha.parashaIndex];
        prog.parasha.aliyahIndex = prev.aliyot.length - 1;
    }
    saveProgress(prog);
    updateParashaUI();
}

// ── Utility helpers ──
// Strip cantillation marks (טעמים U+0591–U+05AF) but keep vowels (ניקוד U+05B0–U+05C7)
function stripTaamim(str) {
    return str.replace(/[\u0591-\u05AF]/g, '');
}

function flattenText(arr, stripAccents = false) {
    if (!arr) return [];
    if (typeof arr === 'string') return [stripAccents ? stripTaamim(arr) : arr];
    if (Array.isArray(arr)) {
        const flat = [];
        arr.forEach(item => {
            if (typeof item === 'string') flat.push(stripAccents ? stripTaamim(item) : item);
            else if (Array.isArray(item)) flat.push(...flattenText(item, stripAccents));
        });
        return flat;
    }
    return [];
}

function showSpinner(elId) {
    document.getElementById(elId).innerHTML = '<div class="spinner"><div class="spinner-ring"></div><span>טוען...</span></div>';

function showError(elId, msg) {

}

// ── Parallax Hero ──
function initParallax() {
    const hero = document.getElementById('hero');
    const deep = document.getElementById('paraDeep');
    const near = document.getElementById('paraNear');
    const content = document.getElementById('heroContent');
    const hint = document.getElementById('scrollHint');

    // Seed parallax star layers
    function seedLayer(el, count, maxSize, maxOpacity) {
        for (let i = 0; i < count; i++) {
            const s = document.createElement('div');
            const sz = Math.random() * maxSize + 0.8;
            s.style.cssText = `position:absolute;background:white;border-radius:50%;width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;opacity:${(Math.random()*maxOpacity).toFixed(2)}`;
            el.appendChild(s);
        }
    }
    seedLayer(deep, 90, 1.8, 0.55);  // slow, distant
    seedLayer(near, 45, 3.5, 0.8);   // fast, close

    // Gold dust particles in hero
    for (let i = 0; i < 12; i++) {
        const p = document.createElement('div');
        const sz = Math.random() * 4 + 2;
        p.style.cssText = `position:absolute;width:${sz}px;height:${sz}px;background:radial-gradient(circle,#f4c430,transparent);border-radius:50%;top:${Math.random()*100}%;left:${Math.random()*100}%;animation:float ${Math.random()*8+6}s ease-in-out infinite;animation-delay:${Math.random()*6}s;opacity:0;pointer-events:none;z-index:2`;
        hero.appendChild(p);
    }

    let ticking = false;
    window.addEventListener('scroll', () => {
        if (!ticking) {
            requestAnimationFrame(() => {
                const y = window.scrollY;
                const h = hero.offsetHeight;
                if (y <= h) {
                    const pct = y / h;
                    deep.style.transform    = `translateY(${y * 0.18}px)`;
                    near.style.transform    = `translateY(${y * 0.42}px)`;
                    content.style.transform = `translateY(${y * 0.58}px)`;
                    content.style.opacity   = Math.max(0, 1 - pct * 2);
                    hint.style.opacity      = Math.max(0, 1 - pct * 4);
                }
                ticking = false;
            });
            ticking = true;
        }
    }, { passive: true });
}
initParallax();

}

function applyTheme(mode) {
    if (mode === 'light') {
        document.body.classList.add('light');
        document.getElementById('themeIcon').textContent = '🌙';
    } else {
        document.body.classList.remove('light');
        document.getElementById('themeIcon').textContent = '☀️';
    }
}
function toggleTheme() {
    const isLight = document.body.classList.contains('light');
    const next = isLight ? 'dark' : 'light';
    localStorage.setItem('colorScheme', next);
    applyTheme(next);
}
