<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ספירת העומר</title>
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #0a0a1a;
            font-family: 'Frank Ruhl Libre', serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Stars */
        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--dur, 3s) ease-in-out infinite;
            animation-delay: var(--delay, 0s);
            opacity: 0;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.8); }
            50% { opacity: var(--max-opacity, 0.8); transform: scale(1.2); }
        }

        /* Floating particles (like sparks/embers) */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            width: 3px; height: 3px;
            background: #f4c430;
            border-radius: 50%;
            animation: float var(--dur, 8s) ease-in-out infinite;
            animation-delay: var(--delay, 0s);
            opacity: 0;
            bottom: -10px;
            left: var(--left, 50%);
        }
        @keyframes float {
            0% { opacity: 0; transform: translateY(0) scale(1); }
            10% { opacity: 0.8; }
            90% { opacity: 0.4; }
            100% { opacity: 0; transform: translateY(-100vh) scale(0.3) rotate(360deg); }
        }

        /* Moon */
        .moon {
            position: fixed;
            top: 60px; left: 80px;
            width: 80px; height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #fffde7, #f4c430, #e6a800);
            box-shadow: 0 0 40px 15px rgba(244, 196, 48, 0.3), 0 0 80px 30px rgba(244, 196, 48, 0.1);
            animation: moonGlow 4s ease-in-out infinite;
            z-index: 1;
        }
        @keyframes moonGlow {
            0%, 100% { box-shadow: 0 0 40px 15px rgba(244, 196, 48, 0.3), 0 0 80px 30px rgba(244, 196, 48, 0.1); }
            50% { box-shadow: 0 0 60px 25px rgba(244, 196, 48, 0.5), 0 0 100px 50px rgba(244, 196, 48, 0.2); }
        }

        /* Main card */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 680px;
            padding: 20px;
        }

        .card {
            background: linear-gradient(135deg, rgba(15,15,40,0.95) 0%, rgba(10,10,25,0.98) 100%);
            border: 1px solid rgba(244, 196, 48, 0.3);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 0 60px rgba(244, 196, 48, 0.1), 0 30px 60px rgba(0,0,0,0.5);
            animation: cardFloat 6s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(244, 196, 48, 0.6), transparent);
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Header */
        .header-title {
            font-size: 14px;
            letter-spacing: 4px;
            color: rgba(244, 196, 48, 0.7);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        /* Sefirah badge */
        .sefirah-badge {
            display: inline-block;
            background: rgba(244, 196, 48, 0.1);
            border: 1px solid rgba(244, 196, 48, 0.3);
            border-radius: 20px;
            padding: 6px 18px;
            font-size: 13px;
            color: #f4c430;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* Day number */
        .day-number {
            font-size: clamp(90px, 20vw, 140px);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(180deg, #fffde7 0%, #f4c430 50%, #c8860a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            animation: numPulse 4s ease-in-out infinite;
            display: block;
        }

        @keyframes numPulse {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(244, 196, 48, 0.4)); }
            50% { filter: drop-shadow(0 0 40px rgba(244, 196, 48, 0.8)); }
        }

        /* Omer formula text */
        .omer-text {
            font-size: clamp(18px, 4vw, 26px);
            font-weight: 500;
            color: #fffde7;
            line-height: 1.7;
            margin-bottom: 8px;
            direction: rtl;
        }

        .omer-text .weeks-part {
            font-size: 0.8em;
            color: rgba(244, 196, 48, 0.8);
        }

        /* Divider */
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #f4c430, transparent);
            margin: 28px auto;
        }

        /* Torah thought */
        .torah-section {
            background: rgba(244, 196, 48, 0.05);
            border-radius: 16px;
            padding: 24px 20px;
            border: 1px solid rgba(244, 196, 48, 0.12);
        }

        .torah-label {
            font-size: 12px;
            letter-spacing: 3px;
            color: rgba(244, 196, 48, 0.6);
            margin-bottom: 14px;
            text-transform: uppercase;
        }

        .torah-quote {
            font-size: clamp(16px, 3.5vw, 20px);
            font-weight: 400;
            color: #fffde7;
            line-height: 1.8;
            margin-bottom: 12px;
            direction: rtl;
        }

        .torah-quote::before {
            content: '"';
            color: #f4c430;
            font-size: 1.4em;
            font-weight: 900;
        }
        .torah-quote::after {
            content: '"';
            color: #f4c430;
            font-size: 1.4em;
            font-weight: 900;
        }

        .torah-source {
            font-size: 14px;
            color: rgba(244, 196, 48, 0.7);
            font-style: italic;
        }

        /* Date display */
        .date-display {
            margin-top: 28px;
            font-size: 13px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 1px;
        }

        /* Before/after omer messages */
        .message-card {
            font-size: clamp(22px, 5vw, 32px);
            color: #fffde7;
            line-height: 1.6;
        }
        .message-sub {
            font-size: 16px;
            color: rgba(244, 196, 48, 0.7);
            margin-top: 12px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card { padding: 36px 24px; }
            .moon { width: 50px; height: 50px; top: 30px; left: 30px; }
        }
    </style>
</head>

function getOmerFormula(day) {
    const weeks = Math.floor(day / 7);
    const remainingDays = day % 7;

    let dayPart = '';
    if (day === 1) {
        dayPart = 'יוֹם אֶחָד';
    } else {
        dayPart = hebrewNumbers[day] + ' יָמִים';
    }

    let weeksPart = '';
    if (weeks > 0) {
        weeksPart = ' שֶׁהֵם ' + weekNames[weeks];
        if (remainingDays > 0) {
            if (remainingDays === 1) {
                weeksPart += ' וְיוֹם אֶחָד';
            } else {
                weeksPart += ' וְ' + hebrewNumbers[remainingDays] + ' יָמִים';
            }
        }
    }

    return { dayPart, weeksPart };
}

function getTodayOmerDay() {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const start = new Date(OMER_START);
    start.setHours(0, 0, 0, 0);
    const diff = Math.floor((today - start) / (1000 * 60 * 60 * 24));
    return diff + 1; // Day 1 = first day
}

function getHebrewDate() {
    const today = new Date();
    return today.toLocaleDateString('he-IL', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    });
}

function isLagBaomer(day) {
    return day === 33;
}

function render() {
    const day = getTodayOmerDay();
    const content = document.getElementById('content');

    if (day < 1) {
        // Before omer
        const daysUntil = 1 - day;
        content.innerHTML = `
            <p class="header-title">ספירת העומר</p>
            <div class="message-card">
                🌸 הספירה מתחילה בעוד ${daysUntil === 0 ? 'הלילה!' : daysUntil + ' ימים'}
            </div>
            <p class="message-sub">חג פסח שמח!</p>
            <p class="date-display">${getHebrewDate()}</p>
        `;
        return;
    }

    if (day > 49) {
        // After omer - Shavuot
        content.innerHTML = `
            <p class="header-title">✨ חג שבועות שמח! ✨</p>
            <div class="message-card">
                🌸 קיבלנו את התורה בשמחה! 🌸
            </div>
            <p class="message-sub">תורה וחיים לעם ישראל</p>
            <p class="date-display">${getHebrewDate()}</p>
        `;
        return;
    }

    const { dayPart, weeksPart } = getOmerFormula(day);
    const sefirah = sefirot[day];
    const torah = torahThoughts[day];
    const lagBaomer = isLagBaomer(day);

    content.innerHTML = `
        <p class="header-title">${lagBaomer ? '🔥 לג בעומר 🔥' : 'ספירת העומר'}</p>
        <div class="sefirah-badge">${sefirah}</div>

        <span class="day-number">${day}</span>

        <p class="omer-text">
            הַיּוֹם ${dayPart}
            ${weeksPart ? `<br><span class="weeks-part">${weeksPart}</span>` : ''}
            <br>לָעֹמֶר
        </p>

        <div class="divider"></div>

        <div class="torah-section">
            <p class="torah-label">💎 דבר תורה יומי</p>
            <p class="torah-quote">${torah.q}</p>
            <p class="torah-source">— ${torah.s}</p>
            ${torah.t ? `<p style="font-size:13px; color:rgba(255,255,255,0.4); margin-top:8px; font-style:italic;">${torah.t}</p>` : ''}
        </div>

        <p class="date-display">${getHebrewDate()}</p>
    `;
}

// ===== STARS =====
function createStars() {
    const container = document.getElementById('stars');
    const count = 120;
    for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 2.5 + 0.5;
        star.style.cssText = `
            width: ${size}px;
            height: ${size}px;
            top: ${Math.random() * 100}%;
            left: ${Math.random() * 100}%;
            --dur: ${Math.random() * 4 + 2}s;
            --delay: ${Math.random() * 6}s;
            --max-opacity: ${Math.random() * 0.7 + 0.3};
        `;
        container.appendChild(star);
    }
}

function createParticles() {
    const container = document.getElementById('particles');
    const count = 20;
    for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.cssText = `
            --left: ${Math.random() * 100}%;
            --dur: ${Math.random() * 10 + 6}s;
            --delay: ${Math.random() * 10}s;
        `;
        container.appendChild(p);
    }
}
